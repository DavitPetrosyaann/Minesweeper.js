<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mahogany Minesweeper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              mahogany: {
                950: '#2a110a',
                900: '#3e1a10',
                800: '#5c2616',
                700: '#7a331c',
                600: '#994023',
              },
              brass: {
                400: '#fbbf24',
                500: '#f59e0b',
                600: '#d97706',
                900: '#451a03',
              }
            },
            keyframes: {
              shake: {
                '0%, 100%': { transform: 'translateX(0)' },
                '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-5px)' },
                '20%, 40%, 60%, 80%': { transform: 'translateX(5px)' },
              }
            },
            animation: {
              shake: 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
            }
          }
        }
      }
    </script>
    <style>
      /* Custom styles for things Tailwind arbitrary values struggle with cleanly */
      body {
        background-color: #1a0b06; /* Deep dark background */
        color: #e5e5e5;
        overflow: hidden; /* Prevent scroll on shake */
      }
      .wood-texture {
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.08'/%3E%3C/svg%3E");
      }
      .brass-text {
        text-shadow: 0 1px 2px rgba(0,0,0,0.8), 0 0 5px rgba(245, 158, 11, 0.4);
      }
      .recessed-inner {
        box-shadow: inset 0 4px 8px rgba(0,0,0,0.6), inset 0 1px 3px rgba(0,0,0,0.8);
      }
      .bevel-raised {
        box-shadow: 
          inset 2px 2px 4px rgba(255,255,255,0.15),
          inset -3px -3px 6px rgba(0,0,0,0.6),
          0 2px 4px rgba(0,0,0,0.5);
      }
    </style>
      </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./index.tsx"></script>
  </body>
</html>
